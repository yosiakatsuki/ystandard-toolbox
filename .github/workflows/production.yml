name: Production Build
on:
  push:
    branches:
      - v2.0.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: 'npm'

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Zip
        run: npm run zip

      - name: Release File Copy
        run: npm run copy:production

      - name: Upload release files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR_PRODUCTION }}
        run: |
          REMOTE_DIR="${FTP_REMOTE_DIR%/}"
          REMOTE_DIR="/${REMOTE_DIR#/}"
          BASE_URL="ftp://${FTP_SERVER}${REMOTE_DIR}"

          curl --fail --show-error --ftp-create-dirs \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            --upload-file upload/ystandard-toolbox.zip \
            "${BASE_URL}/ystandard-toolbox.zip"

          curl --fail --show-error --ftp-create-dirs \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            --upload-file upload/ystandard-toolbox.json \
            "${BASE_URL}/ystandard-toolbox.json"

